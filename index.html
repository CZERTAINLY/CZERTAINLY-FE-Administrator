<!doctype html>
<html lang="en">
    <head>
        <script>
            // Canonicalise to trailing-slash form before any relative resource is fetched,
            // so ./config.js and ./assets/* resolve against the correct base regardless of
            // whether the user entered the app with or without a trailing slash.
            if (!location.pathname.endsWith('/')) {
                location.replace(location.pathname + '/' + location.search + location.hash);
            }
        </script>
        <script type="text/javascript" src="./config.js"></script>
        <meta charset="utf-8" />
        <link rel="icon" href="./ot-sign-color.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.svg" />
        <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32x32.svg" />
        <link rel="icon" type="image/png" sizes="16x16" href="./favicon-16x16.svg" />
        <link rel="manifest" href="./manifest.json" />
        <link rel="mask-icon" href="./ot-sign-color.svg" color="#5bbad5" />
        <meta name="msapplication-TileColor" content="#da532c" />
        <meta name="theme-color" content="#ffffff" />
        <meta name="description" content="ILM" />
        <title>ILM</title>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
        <script type="module" src="./src/index.tsx"></script>
    </body>
</html>
