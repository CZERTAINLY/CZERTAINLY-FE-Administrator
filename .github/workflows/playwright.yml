name: Playwright Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # Continue running other browser jobs even if one fails
      matrix:
        browser: [chromium, firefox, webkit]  # Creates 3 parallel jobs
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Install Playwright Browsers
        # Only install the browser needed for this job (faster)
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run Playwright tests
        # Run only the project matching this browser
        run: npx playwright test -c playwright.config.ts --project=${{ matrix.browser }}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          # Unique artifact name per browser to avoid conflicts
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30
