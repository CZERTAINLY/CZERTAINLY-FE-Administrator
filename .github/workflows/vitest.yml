name: Functional Tests with Vitest
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22.x
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Run Vitest tests
        run: npm run test:vitest
