name: Sonar
on:
  workflow_dispatch:
    inputs:
      pr_number:   { description: "PR number", required: true }
      head_sha:    { description: "Head commit SHA", required: true }
      head_repo:   { description: "Fork repo full_name", required: true }
      head_branch: { description: "Fork branch", required: true }
      base_ref:    { description: "Base branch", required: true }

# What appears in the Actions list
run-name: >-
  Sonar • PR #${{ inputs.pr_number }}
  • ${{ inputs.head_repo }}@${{ inputs.head_branch }}
  • ${{ inputs.head_sha }}

permissions:
  contents: read
  checks: write
  pull-requests: read

jobs:
  sonar:
    name: Sonar • PR #${{ inputs.pr_number }}
    runs-on: ubuntu-latest

    steps:
      - name: Export context
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          HEAD_SHA: ${{ inputs.head_sha }}
          HEAD_REPO: ${{ inputs.head_repo }}
          PR_BRANCH: ${{ inputs.head_branch }}
          BASE_BRANCH: ${{ inputs.base_ref }}
        run: |
          echo "PR_NUMBER=$PR_NUMBER"     >> "$GITHUB_ENV"
          echo "HEAD_SHA=$HEAD_SHA"       >> "$GITHUB_ENV"
          echo "HEAD_REPO=$HEAD_REPO"     >> "$GITHUB_ENV"
          echo "PR_BRANCH=$PR_BRANCH"     >> "$GITHUB_ENV"
          echo "BASE_BRANCH=$BASE_BRANCH" >> "$GITHUB_ENV"

      - name: Generate token
        id: app_token
        uses: tibdex/github-app-token@3beb63f4bd073e61482598c45c71c1019b59b73a # v2.1.0
        with:
          app_id: ${{ secrets.SONAR_GH_APP_ID }}
          private_key: ${{ secrets.SONAR_GH_APP_PRIVATE_KEY }}

      - name: Create GitHub Check (in_progress)
        id: create_check
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const check = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: `SonarQube Analysis`,
              head_sha: process.env.HEAD_SHA,
              status: "in_progress"
            });
            core.setOutput("check_id", check.data.id);

      # Checkout fork PR branch + fetch base to compute diff
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ env.HEAD_REPO }}
          ref: ${{ env.PR_BRANCH }}
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git remote add upstream ${{ github.event.repository.clone_url }}
          git fetch upstream $BASE_BRANCH
          git checkout -B "$BASE_BRANCH" "upstream/$BASE_BRANCH"
          git checkout "$PR_BRANCH"
          git clean -ffdx && git reset --hard HEAD

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm

      - name: Install + lint + build + tests + coverage
        env:
          CI: true
        run: |
          npm ci --ignore-scripts
          npm run lint
          npm run build

          # Playwright deps (CLI invocation, not npm install — --ignore-scripts does not apply)
          npx --no-install playwright install --with-deps # NOSONAR

          npm run test:cov

          # Sanity check
          test -f coverage-playwright/lcov.info
          echo "Playwright LCOV generated: $(wc -l coverage-playwright/lcov.info | awk '{print $1}') lines"
          test -f coverage-vitest/lcov.info
          echo "Vitest LCOV generated: $(wc -l coverage-vitest/lcov.info | awk '{print $1}') lines"

      - name: Sonar Scan
        uses: SonarSource/sonarqube-scan-action@c7ee0f9df90b7aa20e8dcf9695dcfe2e7da5b4f2 # v7.2.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN:  ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.scm.revision=${{ env.HEAD_SHA }}
            -Dsonar.pullrequest.key=${{ env.PR_NUMBER }}
            -Dsonar.pullrequest.branch=${{ env.PR_BRANCH }}
            -Dsonar.pullrequest.base=${{ env.BASE_BRANCH }}

      - name: Finalize GitHub Check
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ steps.app_token.outputs.token }}
          script: |
            const checkId = "${{ steps.create_check.outputs.check_id }}";
            const status = "${{ job.status }}";
            const conclusions = { success: "success", failure: "failure", cancelled: "cancelled" };
            const conclusion = conclusions[status] || "failure";
            await github.rest.checks.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_run_id: checkId,
              completed_at: new Date().toISOString(),
              status: "completed",
              conclusion,
              output: {
                title: "SonarQube Analysis Result",
                summary: `✅ SonarQube analysis concluded with status: **${conclusion}**`,
              }
            });
