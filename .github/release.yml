changelog:
  exclude:
    labels:
      - ignore-for-release
  categories:
    - title: "✨ New Features"
      labels: [new-feature]
    - title: "🔧 Enhancements"
      labels: [enhancement]
    - title: "🐛 Bug Fixes"
      labels: [bug]
    - title: "🔒 Security"
      labels: [vulnerability]
    - title: "⚡ Performance"
      labels: [performance]
    - title: "🧪 QA & Testing"
      labels: [qa]
    - title: "📖 Documentation"
      labels: [documentation]
    - title: "📦 Dependencies"
      labels: [dependencies]
    - title: "📋 Other"
      labels: ["*"]
